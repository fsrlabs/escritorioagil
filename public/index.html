<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>escritórioágil — acesso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a18;--ink-2:#3a3a36;--ink-3:#6a6a62;--ink-4:#9a9a8e;
  --bg:#f5f3ee;--bg-2:#edeae3;--bg-3:#e4e1d8;
  --white:#ffffff;
  --green:#1D9E75;--green-dark:#0F6E56;--green-pale:#eef7f3;
  --border:rgba(26,26,24,0.1);--border-2:rgba(26,26,24,0.16);
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--ink)}

/* TOPBAR */
.topbar{height:52px;background:var(--ink);display:flex;align-items:center;padding:0 24px}
.topbar-logo{font-family:var(--serif);font-size:18px;color:var(--bg);letter-spacing:-0.3px}
.topbar-logo span{color:#7dbf9a;font-style:italic}

/* LOGIN WRAPPER */
.wrapper{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 52px);padding:32px 16px}

.card{
  background:var(--white);
  border:1px solid var(--border-2);
  border-radius:12px;
  padding:40px;
  width:100%;
  max-width:380px;
  box-shadow:0 4px 24px rgba(26,26,24,0.06);
  animation:fadeUp 0.35s ease both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

.card-eyebrow{
  font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--green);margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.card-eyebrow::before{
  content:'';width:6px;height:6px;border-radius:50%;background:var(--green);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.card-title{
  font-family:var(--serif);font-size:26px;letter-spacing:-0.3px;
  color:var(--ink);margin-bottom:6px;
}
.card-sub{font-size:13px;color:var(--ink-4);margin-bottom:28px;line-height:1.5}

label{
  display:block;font-size:11px;font-weight:500;letter-spacing:0.05em;
  text-transform:uppercase;color:var(--ink-4);margin-bottom:8px;
}

input[type="password"]{
  width:100%;border:1px solid var(--border-2);border-radius:7px;
  padding:11px 14px;font-family:var(--sans);font-size:14px;
  color:var(--ink);background:var(--bg);outline:none;
  transition:border-color 0.15s,background 0.15s;
}
input[type="password"]:focus{border-color:var(--green);background:var(--white)}
input[type="password"]::placeholder{color:var(--ink-4)}

.btn{
  width:100%;margin-top:16px;padding:12px;
  background:var(--green);border:none;border-radius:7px;
  font-family:var(--sans);font-size:13px;font-weight:500;
  color:#fff;cursor:pointer;transition:background 0.15s,transform 0.1s;
  letter-spacing:0.01em;
}
.btn:hover{background:var(--green-dark)}
.btn:active{transform:scale(0.99)}
.btn:disabled{opacity:0.6;cursor:not-allowed}

.error{
  margin-top:12px;padding:10px 14px;
  background:#FCEBEB;border:1px solid #f1c5c5;border-radius:7px;
  font-size:12px;color:#791F1F;display:none;
  animation:fadeIn 0.2s ease;
}
.error.visible{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">escritório<span>ágil</span></div>
</div>

<div class="wrapper">
  <div class="card">
    <div class="card-eyebrow">Acesso restrito</div>
    <div class="card-title">Bem-vindo de volta.</div>
    <div class="card-sub">Digite a senha para acessar o dashboard.</div>

    <label for="pwd">Senha</label>
    <input type="password" id="pwd" placeholder="••••••••" autofocus />

    <button class="btn" id="btn" onclick="login()">Entrar</button>
    <div class="error" id="error">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<script>
async function login() {
  const pwd = document.getElementById('pwd').value.trim();
  if (!pwd) return;

  const btn = document.getElementById('btn');
  const errEl = document.getElementById('error');
  btn.disabled = true;
  btn.textContent = 'Verificando...';
  errEl.classList.remove('visible');

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd }),
    });

    if (res.ok) {
      btn.textContent = '✓ Acesso liberado';
      setTimeout(() => { window.location.href = '/dashboard.html'; }, 300);
    } else {
      errEl.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Entrar';
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
    }
  } catch (e) {
    errEl.textContent = 'Erro de conexão. Tente novamente.';
    errEl.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
